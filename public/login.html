<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Soporte TI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Acceso Soporte TI</h1>
        <p>Ingreso privado para revisar y cerrar tickets.</p>
      </div>
      <nav>
        <a class="button secondary" href="/ticket">Ingresar ticket</a>
      </nav>
    </div>
  </header>

  <main class="narrow">
    <section class="panel">
      <div class="message" id="message"></div>
      <form class="grid-form" id="loginForm">
        <div class="field full">
          <label for="user">Usuario</label>
          <input id="user" name="user" type="text" autocomplete="username" required />
        </div>
        <div class="field full">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <div class="actions">
          <button class="primary" type="submit">Ingresar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/login.js"></script>
</body>
</html>
